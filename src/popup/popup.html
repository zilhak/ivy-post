<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
    }

    .header {
      padding: 12px 16px;
      background: #6366f1;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }

    .status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.2);
    }

    .actions {
      padding: 8px 16px;
      border-bottom: 1px solid #f3f4f6;
    }

    .btn-pin {
      width: 100%;
      padding: 8px;
      background: #f3f4f6;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-pin:hover {
      background: #e5e7eb;
    }

    .comment-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .comment-item {
      padding: 10px 16px;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
    }

    .comment-item:hover {
      background: #fafafa;
    }

    .comment-item.resolved {
      opacity: 0.5;
    }

    .comment-author {
      font-weight: 600;
      font-size: 12px;
    }

    .comment-content {
      margin-top: 2px;
      color: #4b5563;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .comment-meta {
      margin-top: 4px;
      font-size: 10px;
      color: #9ca3af;
    }

    .empty {
      padding: 24px 16px;
      text-align: center;
      color: #9ca3af;
    }

    .settings {
      padding: 8px 16px;
      border-top: 1px solid #f3f4f6;
    }

    .settings label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #6b7280;
    }

    .settings input {
      padding: 4px 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 12px;
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>IvyPost</h1>
    <span class="status" id="status">확인 중...</span>
  </div>

  <div class="actions">
    <button class="btn-pin" id="btn-pin">
      핀 모드 (Alt+Shift+P)
    </button>
  </div>

  <div class="comment-list" id="comment-list">
    <div class="empty">댓글이 없습니다</div>
  </div>

  <div class="settings">
    <label>
      작성자:
      <input type="text" id="author-input" placeholder="이름" />
    </label>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
