openapi: 3.1.0
info:
  title: IvyPost API
  version: 0.1.0
  description: |
    IvyPost 서버 연동 API 스펙.
    웹 서버에 아래 엔드포인트를 구현하면 IvyPost 익스텐션과 자동 연동됩니다.

    - 기본 경로: `/__ivypost__/*`
    - 익스텐션은 현재 페이지의 origin에 요청합니다.

servers:
  - url: "{origin}/__ivypost__"
    description: 현재 페이지 origin 기준
    variables:
      origin:
        default: http://localhost:3000

paths:
  /comments:
    get:
      summary: 댓글 목록 조회
      description: 해당 URL에 달린 댓글 목록을 반환합니다.
      parameters:
        - name: url
          in: query
          required: true
          description: 페이지 경로 (pathname + search)
          schema:
            type: string
            example: "/namespace/detail/my-ns"
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentsResponse"

    post:
      summary: 댓글 생성
      description: |
        서버는 요청 본문을 받아 다음 필드를 생성/초기화하여 Comment를 반환합니다:
        - `id`: 서버에서 UUID 생성
        - `resolved`: false로 초기화
        - `createdAt`: 서버 시각 (ISO 8601)
        - `replies`: 빈 배열
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreate"
      responses:
        "201":
          description: 생성 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /comments/{id}:
    put:
      summary: 댓글 수정
      parameters:
        - $ref: "#/components/parameters/CommentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentUpdate"
      responses:
        "200":
          description: 수정 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "404":
          description: 댓글 없음

    delete:
      summary: 댓글 삭제
      parameters:
        - $ref: "#/components/parameters/CommentId"
      responses:
        "204":
          description: 삭제 완료
        "404":
          description: 댓글 없음

  /screenshots:
    post:
      summary: 스크린샷 업로드
      description: (선택) 댓글에 첨부할 스크린샷을 업로드합니다.
      requestBody:
        required: true
        content:
          image/png:
            schema:
              type: string
              format: binary
      responses:
        "201":
          description: 업로드 완료
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id:
                    type: string

  /screenshots/{id}:
    get:
      summary: 스크린샷 조회
      description: (선택) 업로드된 스크린샷을 반환합니다.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 스크린샷 바이너리
          content:
            image/png:
              schema:
                type: string
                format: binary
        "404":
          description: 스크린샷 없음

components:
  parameters:
    CommentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Anchor:
      type: object
      description: DOM 요소 재탐색을 위한 복합 단서
      required: [selector, tagName, className, rect, attributes]
      properties:
        selector:
          type: string
          description: CSS selector
          example: "div.content > ul > li:nth-child(3) > button"
        testId:
          type: string
          nullable: true
          description: data-testid 속성값
        id:
          type: string
          nullable: true
          description: 요소의 id 속성
        textContent:
          type: string
          description: 요소 텍스트 (최대 100자)
          maxLength: 100
        tagName:
          type: string
          example: "BUTTON"
        className:
          type: string
          example: "submit-btn primary"
        rect:
          type: object
          description: 뷰포트 비율 좌표 (0~1)
          required: [x, y]
          properties:
            x:
              type: number
            y:
              type: number
        nearestIdAncestor:
          nullable: true
          type: object
          description: 가장 가까운 id를 가진 조상 요소 정보
          required: [id, relativePath, depth]
          properties:
            id:
              type: string
            relativePath:
              type: string
            depth:
              type: integer
        attributes:
          type: object
          description: 안정적인 속성 (data-testid, role, type 등)
          additionalProperties:
            type: string

    CommentCreate:
      type: object
      required: [url, content, author, anchor]
      properties:
        url:
          type: string
          description: 페이지 경로 (pathname + search)
          example: "/namespace/detail/my-ns"
        content:
          type: string
          description: 댓글 본문
        author:
          type: string
          description: 작성자 이름
        anchor:
          $ref: "#/components/schemas/Anchor"
        screenshotId:
          type: string
          description: 첨부 스크린샷 ID
        metadata:
          $ref: "#/components/schemas/Metadata"

    CommentUpdate:
      type: object
      properties:
        content:
          type: string
        resolved:
          type: boolean

    Comment:
      type: object
      description: |
        댓글. 서버 생성 필드(readOnly)는 생성 시 서버가 자동으로 채웁니다.
      required: [id, url, content, author, resolved, anchor, createdAt, replies]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: 서버에서 생성
        url:
          type: string
        content:
          type: string
        author:
          type: string
        resolved:
          type: boolean
          readOnly: true
          description: 생성 시 false. CommentUpdate로만 변경
        anchor:
          $ref: "#/components/schemas/Anchor"
        screenshotId:
          type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: 서버에서 생성 (ISO 8601)
        replies:
          type: array
          readOnly: true
          description: 생성 시 빈 배열
          items:
            $ref: "#/components/schemas/Reply"

    Reply:
      type: object
      required: [id, content, author, createdAt]
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        author:
          type: string
        createdAt:
          type: string
          format: date-time

    Metadata:
      type: object
      properties:
        viewport:
          type: string
          example: "1920x1080"
        userAgent:
          type: string
        timestamp:
          type: string
          format: date-time

    CommentsResponse:
      type: object
      required: [comments]
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
